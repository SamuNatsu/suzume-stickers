name: Generate Manifests and Previews

on:
  push:
    paths:
      - stickers/**
  workflow_dispatch:

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install Pillow natsort

      - name: Install CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Cleanup previews
        run: |
          rm -rf assets/preview
          mkdir -p assets/preview

      - name: Generate
        run: python scripts/gen-all.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update manifests and previews"
          file_pattern: assets/preview/*.webp manifest.json PREVIEW.md README.md
