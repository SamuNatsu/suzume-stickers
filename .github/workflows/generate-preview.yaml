name: Generate Sticker Previews

on:
  push:
    paths:
      - stickers/**
  workflow_dispatch:

jobs:
  build-previews:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Install CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Create output directory
        run: mkdir -p assets/preview

      - name: Generate Preview Images
        run: python scripts/gen-preview.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update sticker preview images"
          file_pattern: "assets/preview/*.webp PREVIEW.md"
